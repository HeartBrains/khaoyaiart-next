name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          BKKK_BASE_URL: ${{ secrets.VITE_BKKK_BASE_URL }}
          KYAF_BASE_URL: ${{ secrets.VITE_KYAF_BASE_URL }}

      - name: Deploy to Hostinger
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: out/
          remote_path: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          remote_host: ${{ secrets.HOSTINGER_SSH_HOST }}
          remote_port: ${{ secrets.HOSTINGER_SSH_PORT }}
          remote_user: ${{ secrets.HOSTINGER_SSH_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}
