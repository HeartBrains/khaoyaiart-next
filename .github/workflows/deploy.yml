name: Build & Deploy

on:
  repository_dispatch:
    types: [wp_content_updated]
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          WP_BASE_URL: ${{ secrets.NEXT_PUBLIC_WP_BASE_URL }}
          NEXT_PUBLIC_WP_BASE_URL: ${{ secrets.NEXT_PUBLIC_WP_BASE_URL }}

      - name: Commit build output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/
          git commit -m "SSG rebuild $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || exit 0
          git push
