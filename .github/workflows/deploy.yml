name: Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'utils/**'
      - 'public/**'
      - 'next.config.ts'
      - 'package.json'
  repository_dispatch:
    types: [wp_content_updated]
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          WP_BASE_URL: ${{ secrets.NEXT_PUBLIC_WP_BASE_URL }}
          NEXT_PUBLIC_WP_BASE_URL: ${{ secrets.NEXT_PUBLIC_WP_BASE_URL }}
          WP_AUTH_USER: ${{ secrets.WP_AUTH_USER }}
          WP_AUTH_PASS: ${{ secrets.WP_AUTH_PASS }}
          BKKK_BASE_URL: ${{ secrets.BKKK_BASE_URL || 'https://khaoyaiart.org/bk' }}
          KYAF_BASE_URL: ${{ secrets.KYAF_BASE_URL || 'https://khaoyaiart.org/kyaf' }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://khaoyaiart.org' }}

      - name: Commit build output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git reset --soft origin/master
          git add out/
          git diff --cached --quiet && exit 0
          git commit -m "SSG rebuild $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
