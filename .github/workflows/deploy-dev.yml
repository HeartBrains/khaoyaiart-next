name: Build & Deploy (dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    # Skip when the push was made by this workflow itself
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          WP_BASE_URL: ${{ secrets.NEXT_PUBLIC_WP_BASE_URL }}
          NEXT_PUBLIC_WP_BASE_URL: ${{ secrets.NEXT_PUBLIC_WP_BASE_URL }}
          WP_AUTH_USER: ${{ secrets.WP_AUTH_USER }}
          WP_AUTH_PASS: ${{ secrets.WP_AUTH_PASS }}
          BKKK_BASE_URL: https://dev.khaoyaiart.org/bk
          KYAF_BASE_URL: https://dev.khaoyaiart.org/kyaf
          SITE_URL: https://dev.khaoyaiart.org

      - name: Commit build output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git reset --soft origin/dev
          git add out/
          git diff --cached --quiet && exit 0
          git commit -m "SSG rebuild (dev) $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin dev
